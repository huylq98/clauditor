<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Clauditor</title>
    <link rel="stylesheet" href="../../node_modules/xterm/css/xterm.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <header id="rail">
        <div class="rail-brand">
          <svg class="brand-mark" viewBox="0 0 64 64" aria-hidden="true">
            <path d="M32 16 L52 32 L32 48 L12 32 Z" fill="var(--fog)" opacity="0.35"/>
            <path d="M32 12 L52 32 L32 48 L12 32 Z" fill="var(--ember-deep)" opacity="0.75"/>
            <path d="M32 8 L52 28 L32 48 L12 28 Z" fill="var(--ember)"/>
            <path d="M32 8 L52 28 L32 28 Z" fill="var(--ember-light)" opacity="0.6"/>
          </svg>
          <span class="brand-name">clauditor<span class="brand-dot">.</span></span>
        </div>
      </header>

      <nav id="tabbar">
        <div id="tab-list" role="tablist"></div>
        <button id="session-menu-btn" title="Session actions" aria-haspopup="true" aria-expanded="false">⋯</button>
        <button id="new-session" title="New session (Ctrl+T)">+ new</button>
      </nav>

      <aside id="sidebar">
        <div id="sidebar-search">
          <span class="search-icon">⌕</span>
          <input id="tree-filter" type="text" placeholder="filter files…" spellcheck="false" />
        </div>
        <div id="sidebar-tree">
          <h2 class="panel-title">Files</h2>
          <ul id="file-tree"></ul>
          <div class="sidebar-empty" id="tree-empty">No session selected.</div>
        </div>
        <div id="sidebar-activity" class="collapsed">
          <button id="activity-toggle" aria-expanded="false">
            <span>Activity</span><span class="activity-arrow">▸</span>
          </button>
          <ul id="activity-log"></ul>
        </div>
      </aside>

      <main id="main">
        <header id="topbar">
          <div id="cwd-label" class="topbar-cwd">No session selected</div>
          <div class="topbar-right">
            <span id="state-pill" class="pill">idle</span>
            <button id="kill-btn" disabled>Kill</button>
          </div>
        </header>
        <div id="terminal-container"></div>
        <footer id="statusbar">
          <span id="aggregate" class="status-aggregate">No sessions</span>
          <span class="status-hint">Ctrl+1..9 switch · Ctrl+T new · Ctrl+W close</span>
        </footer>
      </main>
    </div>
    <script src="../../node_modules/xterm/lib/xterm.js"></script>
    <script src="../../node_modules/xterm-addon-fit/lib/xterm-addon-fit.js"></script>
    <script src="../../node_modules/xterm-addon-web-links/lib/xterm-addon-web-links.js"></script>
    <script src="../../node_modules/xterm-addon-webgl/lib/xterm-addon-webgl.js"></script>
    <script src="components/tree.js"></script>
    <script src="components/tabbar.js"></script>
    <script src="components/sidebar.js"></script>
    <script src="renderer.js"></script>
  </body>
</html>
