name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to re-release (e.g. v0.2.0)"
        required: true
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Fast pre-flight. Fails in ~30 s on a broken TS diff before we
  # spend 8 min compiling Rust on Windows.
  # ─────────────────────────────────────────────────────────────────
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          run_install: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Type-check
        run: pnpm exec tsc -b
      - name: Frontend build
        run: pnpm run build

  build:
    name: Build ${{ matrix.target }}
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    permissions:
      contents: write        # publish draft release
      id-token: write        # sigstore OIDC for attestation
      attestations: write    # build-provenance attestation

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Linux system deps
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            xdg-utils

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          run_install: false

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "./src-tauri -> target"
          key: release-${{ matrix.target }}

      - run: pnpm install --frozen-lockfile

      - name: Build Tauri bundle
        id: bundle
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: "Clauditor ${{ inputs.tag || github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Guard against test-hooks in release binary
        shell: bash
        run: |
          set -e
          # Search for symbols that should only exist in test-hooks builds.
          # The strings binary works on both ELF (Linux/macOS) and PE (Windows).
          for bin in src-tauri/target/release/clauditor src-tauri/target/release/clauditor.exe src-tauri/target/release/bundle/**/clauditor*; do
            [ -e "$bin" ] || continue
            if strings "$bin" 2>/dev/null | grep -qE 'dump_fsm|hook_port_cmd|__test__'; then
              echo "ERROR: release binary $bin contains test-hooks symbols" >&2
              echo "       This means the build accidentally enabled the test-hooks feature." >&2
              exit 1
            fi
            echo "OK: $bin contains no test-hooks symbols"
          done
      # ─────────────────────────────────────────────────────────────
      # Supply-chain attestation: sigstore-signed proof that this
      # installer came from this commit on this workflow. Users verify
      # with `gh attestation verify <file> --repo huylq98/clauditor`.
      # ─────────────────────────────────────────────────────────────
      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.rpm
