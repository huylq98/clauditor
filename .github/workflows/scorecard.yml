name: OSSF Scorecard

on:
  # Weekly supply-chain health check.
  schedule:
    - cron: "30 5 * * 1"
  # Re-evaluate whenever branch-protection / workflows change.
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

# OSSF Scorecard's signature verification REJECTS workflows containing
# global env vars or `defaults:` blocks. Any environment tweaks must live
# inside individual steps, not at workflow/job scope.
# See https://github.com/ossf/scorecard-action#workflow-restrictions

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      # Needed to upload SARIF results to the Security tab.
      security-events: write
      # Needed to receive a Sigstore OIDC token so Scorecard can publish results.
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publishes to https://api.securityscorecards.dev so the badge works.
          publish_results: true

      - name: Upload SARIF to Security tab
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4
        with:
          sarif_file: results.sarif
