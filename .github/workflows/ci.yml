name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Frontend: typecheck, bundle, smoke + UI-review e2e tests.
  # Required for merge.
  # ─────────────────────────────────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type-check
        run: npx tsc -b
      - name: Production build
        run: npm run build
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Smoke tests
        run: npm run test:smoke
      - name: UI review (screenshot capture)
        run: npm run test:ui-review
      - name: Upload UI review screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-review-screenshots
          path: tests/artifacts/review/
          if-no-files-found: ignore
      - name: Upload Playwright HTML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────
  # Perf suite: runs against the production build. Timing-sensitive,
  # so we *report* numbers but don't block merge on them — CI runners
  # have highly variable CPU.
  # ─────────────────────────────────────────────────────────────────
  perf:
    runs-on: ubuntu-latest
    needs: frontend
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Run perf suite against production build
        run: npm run perf:prod
      - name: Upload perf report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-report
          path: tests/artifacts/perf/
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────
  # Backend: fmt + clippy + tests on all three target OSes.
  # Required for merge.
  # ─────────────────────────────────────────────────────────────────
  backend:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev build-essential curl wget file libssl-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: cargo fmt
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        working-directory: src-tauri
        run: cargo test --all
