name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  # Opt into Node.js 24 runtime for all JavaScript actions ahead of
  # GitHub's June-2026 default flip. Removes deprecation warnings.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Path-based change detection. Every downstream job gates on these
  # outputs so doc-only PRs don't rebuild the Rust matrix.
  # Skipped jobs still register a "skipped" status, which branch
  # protection treats as passed for required checks.
  # ─────────────────────────────────────────────────────────────────
  filter:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      frontend: ${{ steps.f.outputs.frontend }}
      backend: ${{ steps.f.outputs.backend }}
      workflows: ${{ steps.f.outputs.workflows }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - id: f
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          filters: |
            frontend:
              - 'src/**'
              - 'tests/**'
              - 'public/**'
              - 'site/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'playwright.config.*'
              - 'vite.config.ts'
              - 'tsconfig*.json'
              - 'index.html'
              - 'eslint.config.js'
            backend:
              - 'src-tauri/**'
            workflows:
              - '.github/workflows/**'

  # ─────────────────────────────────────────────────────────────────
  # Lint the workflow YAMLs themselves. Fast guard against typos.
  # ─────────────────────────────────────────────────────────────────
  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install actionlint
        run: |
          bash <(curl -sSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
      - name: Lint workflows
        run: ./actionlint -color

  # ─────────────────────────────────────────────────────────────────
  # Frontend: typecheck, bundle, smoke + UI-review e2e tests.
  # ─────────────────────────────────────────────────────────────────
  frontend:
    needs: filter
    if: needs.filter.outputs.frontend == 'true' || needs.filter.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          run_install: false

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm exec tsc -b

      - name: Production build
        run: pnpm run build

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright (browsers cached if hit)
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            pnpm exec playwright install-deps chromium
          else
            pnpm exec playwright install chromium --with-deps
          fi

      - name: Smoke tests
        run: pnpm run test:smoke

      - name: UI review (screenshot capture)
        run: pnpm run test:ui-review

      - name: Upload UI review screenshots
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ui-review-screenshots
          path: tests/artifacts/review/
          if-no-files-found: ignore

      - name: Upload Playwright HTML report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────
  # Perf suite: informational (continue-on-error).
  # ─────────────────────────────────────────────────────────────────
  perf:
    needs: [filter, frontend]
    if: needs.filter.outputs.frontend == 'true' || needs.filter.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          run_install: false

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            pnpm exec playwright install-deps chromium
          else
            pnpm exec playwright install chromium --with-deps
          fi

      - name: Run perf suite against production build
        run: pnpm run perf:prod

      - name: Upload perf report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: perf-report
          path: tests/artifacts/perf/
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────
  # Backend: fmt + clippy + tests on Win / macOS / Linux.
  # ─────────────────────────────────────────────────────────────────
  backend:
    needs: filter
    if: needs.filter.outputs.backend == 'true' || needs.filter.outputs.workflows == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: './src-tauri -> target'

      - name: cargo fmt
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        working-directory: src-tauri
        run: cargo test --all

  # ─────────────────────────────────────────────────────────────────
  # cargo audit: fail on high/critical advisories in our direct deps.
  # Transitive advisories in Tauri's own gtk/webkit2gtk/phf chain are
  # unavoidable until upstream updates land — ignore them explicitly.
  # ─────────────────────────────────────────────────────────────────
  cargo-audit:
    needs: filter
    if: needs.filter.outputs.backend == 'true' || needs.filter.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: src-tauri
          # Transitive-only advisories inherited through tauri's gtk3 / webkit2gtk
          # / kuchikiki / tauri-utils chain. These fail on us but cannot be fixed
          # locally — they clear when tauri-rs updates its deps. Re-audit this
          # list every time we bump `tauri` in Cargo.toml.
          ignore: "RUSTSEC-2017-0008,RUSTSEC-2024-0370,RUSTSEC-2024-0411,RUSTSEC-2024-0412,RUSTSEC-2024-0413,RUSTSEC-2024-0414,RUSTSEC-2024-0415,RUSTSEC-2024-0416,RUSTSEC-2024-0417,RUSTSEC-2024-0418,RUSTSEC-2024-0419,RUSTSEC-2024-0420,RUSTSEC-2024-0429,RUSTSEC-2025-0057,RUSTSEC-2025-0075,RUSTSEC-2025-0080,RUSTSEC-2025-0081,RUSTSEC-2025-0098,RUSTSEC-2025-0100,RUSTSEC-2026-0097"

  # ─────────────────────────────────────────────────────────────────
  # Aggregating gate. `main` branch protection requires only this
  # single check — it fans out to the individual jobs via `needs` and
  # fails the overall run if any required upstream failed.
  # Skipped upstream jobs (path-filter excluded) count as passing.
  # ─────────────────────────────────────────────────────────────────
  ci-gate:
    needs: [actionlint, filter, frontend, backend, cargo-audit]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Require required jobs to succeed or skip
        run: |
          set -e
          actionlint="${{ needs.actionlint.result }}"
          filter="${{ needs.filter.result }}"
          frontend="${{ needs.frontend.result }}"
          backend="${{ needs.backend.result }}"
          audit="${{ needs.cargo-audit.result }}"

          echo "actionlint=$actionlint"
          echo "filter=$filter"
          echo "frontend=$frontend"
          echo "backend=$backend"
          echo "cargo-audit=$audit"

          # filter + actionlint must always succeed.
          [ "$actionlint" = "success" ] || { echo "actionlint failed"; exit 1; }
          [ "$filter" = "success" ] || { echo "filter failed"; exit 1; }

          # frontend + backend + cargo-audit may be skipped (path-filter
          # excluded) but must not have failed.
          for j in "frontend:$frontend" "backend:$backend" "cargo-audit:$audit"; do
            name="${j%:*}"; res="${j#*:}"
            case "$res" in
              success|skipped) ;;
              *) echo "$name failed ($res)"; exit 1;;
            esac
          done

          echo "All required jobs passed or were skipped."
