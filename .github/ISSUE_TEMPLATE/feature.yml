name: Feature request
description: Suggest a new capability or improvement.
title: "[Feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping shape Clauditor. Keep requests focused — small ideas often ship faster than big ones.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the workflow pain this would fix. Avoid jumping to a solution.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like Clauditor to do. Include mockups / examples if helpful.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about and why you ruled them out.

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      multiple: true
      options:
        - UI / UX
        - Terminal behavior
        - Session state / hooks
        - File tree / activity
        - Notifications / tray
        - Packaging / install
        - Performance
        - Developer experience
        - Other

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I've searched existing issues and this is not a duplicate.
          required: true
